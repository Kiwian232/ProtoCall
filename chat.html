<!DOCTYPE html>
<html>
	<head>
		<link rel="icon" type="image/ico" sizes="16x16" href="resources/pc_logo.ico">
		<title>ProtoCall Chatting</title>
		<link rel="stylesheet" href="styles.css">
	</head>
	<body>
		<nav>
			<div id="nav-left">
				<a href="home.html">Home</a>
			</div>
			<div id="nav-middle">
				<span id="username-view"></span>
				<span id="warning"></span>
			</div>
			<div id="nav-right">
				<input id="room-select-input" type="text" style="width: 250px; border: 0px; outline: 0px;" maxlength=25 placeholder="Enter a room name to connect to or create">
				<button id="room-select-submit" style="border: 0px; outline: 0px;" onclick="connectToRoom()">Connect</button>
				<a href="account.html">Account</a>
			</div>
		</nav>

		<div id="chat-screen">
			<aside id="chat-bar-left" class="chat-bar">
				<p style="text-align: center; font-size: 20px; font-weight: bold; color: var(--header-color); position: sticky; top: 0px; background-color: var(--secondary-background-color); margin: 0; padding: 10px 0px;">Known Rooms:</p>
				<ul id="known-room-list"></ul>
			</aside>
			<div id="chat-bar-middle">
				<div id="chat-messages-area">
  					<div id="chat-container"></div>
				</div>
				<input id="chat-input" placeholder="Message"/>
			</div>
			<aside id="chat-bar-right" class="chat-bar">
				<p id="room-name">No Room Connected</p>
				<div style="padding: 8px; color: var(--header-color);">
					<h3>Room Info:</h3>
					Room status: <span id="room-status"></span><br>
					Connected Users: <ul id="connected-users" style="margin-top: 5px; padding-left: 5px; list-style: none; border-left: 1px white solid;"></ul><br>
				</div>
			</aside>
		</div>

  		<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
		<script src="common.js"></script>
  		<script src="client.js"></script>
	</body>
</html>
